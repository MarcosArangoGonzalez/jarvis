{% extends "base.html" %}
{% set title = "Sesiones" %}
{% block content %}
  <section class="panel s-teal">
    <div class="panel-head"><h3>Sesiones recientes</h3></div>
    <div class="result-list">
      {% for session in sessions %}
        <article class="result-card">
          <div class="result-head">
            <strong>{{ session.title }}</strong>
            <span class="badge">{{ session.status }}</span>
          </div>
          <p>{{ session.summary }}</p>
          <small>{{ session.source_path }}</small>
        </article>
      {% endfor %}
    </div>
  </section>
{% endblock %}
