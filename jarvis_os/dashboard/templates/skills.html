{% extends "base.html" %}
{% set title = "Skills" %}
{% block content %}
  <section class="panel">
    <div class="panel-head"><h3>Skill registry</h3></div>
    <div class="skill-grid">
      {% for skill in skills %}
        <article class="skill-card">
          <div class="result-head">
            <strong>{{ skill.name }}</strong>
            <span class="badge">{{ skill.kind }}</span>
          </div>
          <p>{{ skill.description }}</p>
          <small>{{ skill.entrypoint }}</small>
        </article>
      {% endfor %}
    </div>
  </section>
{% endblock %}
