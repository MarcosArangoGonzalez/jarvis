<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "JarvisOS" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/dashboard.css') }}">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>

<!-- SVG icon sprite -->
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="ic-home" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9.5L10 3l7 6.5V17a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M7 18V11h6v7"/>
  </symbol>
  <symbol id="ic-vault" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="10" cy="5" rx="7" ry="2.5"/><path d="M3 5v10c0 1.4 3.1 2.5 7 2.5s7-1.1 7-2.5V5"/><path d="M3 10c0 1.4 3.1 2.5 7 2.5s7-1.1 7-2.5"/>
  </symbol>
  <symbol id="ic-terminal" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="3" width="16" height="14" rx="2"/><path d="M5 8l3 3-3 3M10 14h5"/>
  </symbol>
  <symbol id="ic-search" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="8.5" cy="8.5" r="5"/><path d="M15.5 15.5l-3.5-3.5"/>
  </symbol>
  <symbol id="ic-graph" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="10" cy="10" r="2"/><circle cx="4" cy="4" r="1.5"/><circle cx="16" cy="4" r="1.5"/><circle cx="4" cy="16" r="1.5"/><circle cx="16" cy="16" r="1.5"/><path d="M5.1 5.1L8.6 8.6M11.4 8.6L14.9 5.1M8.6 11.4L5.1 14.9M11.4 11.4L14.9 14.9"/>
  </symbol>
  <symbol id="ic-edit" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.5 2.5a2.12 2.12 0 013 3L6 17l-4 1 1-4L14.5 2.5z"/>
  </symbol>
  <symbol id="ic-mail" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="4" width="16" height="13" rx="2"/><path d="M2 7l8 5 8-5"/>
  </symbol>
  <symbol id="ic-layers" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 10l8 4 8-4M2 14l8 4 8-4M2 6l8-4 8 4-8 4-8-4z"/>
  </symbol>
  <symbol id="ic-code" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 5L2 10l5 5M13 5l5 5-5 5M11 3l-2 14"/>
  </symbol>
  <symbol id="ic-wand" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 17l10-10M10 3l1.5 3 3 1.5-3 1.5L10 12l-1.5-3-3-1.5 3-1.5z"/>
  </symbol>
  <symbol id="ic-bulb" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10 2a6 6 0 00-3 11.2V15a1 1 0 001 1h4a1 1 0 001-1v-1.8A6 6 0 0010 2z"/><path d="M7.5 18h5"/>
  </symbol>
  <symbol id="ic-inbox" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 12h4l2 3h4l2-3h4"/><path d="M2 12V5a1 1 0 011-1h14a1 1 0 011 1v7"/>
  </symbol>
  <symbol id="ic-shield" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10 2L3 5v5c0 4.4 3 8.1 7 9 4-0.9 7-4.6 7-9V5l-7-3z"/><path d="M7 10l2 2 4-4"/>
  </symbol>
  <symbol id="ic-clock" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="10" cy="10" r="8"/><path d="M10 6v4l3 2"/>
  </symbol>
  <symbol id="ic-tool" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.7 3.3a4 4 0 00-5.3 5.3L3 15l2 2 6.4-6.4a4 4 0 005.3-5.3l-2.8 2.8-1.4-1.4 2.8-2.8-.6 1z"/>
  </symbol>
  <symbol id="ic-cog" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="10" cy="10" r="3"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4"/>
  </symbol>
  <symbol id="ic-plug" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 2v4M14 2v4M6 8a4 4 0 008 0H6zM10 12v6"/>
  </symbol>
</svg>

<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-logo">J</span>
      <span class="brand-name">JarvisOS</span>
    </div>

    <nav class="sidebar-nav">

      <div class="nav-group">
        <span class="nav-label">Principal</span>
        <a href="/" class="nav-item c-amber {% if request.url.path == '/' %}active{% endif %}">
          <svg class="nav-icon"><use href="#ic-home"/></svg>Overview
        </a>
        <a href="/vault/search" class="nav-item c-teal {% if request.url.path.startswith('/vault') %}active{% endif %}">
          <svg class="nav-icon"><use href="#ic-vault"/></svg>Vault
        </a>
        <a href="/terminal" class="nav-item c-green {% if request.url.path.startswith('/terminal') %}active{% endif %}">
          <svg class="nav-icon"><use href="#ic-terminal"/></svg>Terminal
        </a>
        <a href="/notepad" class="nav-item c-teal {% if request.url.path.startswith('/notepad') %}active{% endif %}">
          <svg class="nav-icon"><use href="#ic-edit"/></svg>Notepad
        </a>
      </div>

      <div class="nav-group">
        <span class="nav-label">Explorar</span>
        <a href="/research" class="nav-item c-blue {% if request.url.path.startswith('/research') %}active{% endif %}">
          <svg class="nav-icon"><use href="#ic-search"/></svg>Research
        </a>
        <a href="/graph" class="nav-item c-purple {% if request.url.path.startswith('/graph') %}active{% endif %}">
          <svg class="nav-icon"><use href="#ic-graph"/></svg>Graph
        </a>
        <a href="/newsletter" class="nav-item c-amber {% if request.url.path.startswith('/newsletter') %}active{% endif %}">
          <svg class="nav-icon"><use href="#ic-mail"/></svg>Newsletter
        </a>
      </div>

      <div class="nav-group">
        <span class="nav-label">Dev</span>
        <a href="/dev_hub" class="nav-item c-purple {% if request.url.path.startswith('/dev_hub') %}active{% endif %}">
          <svg class="nav-icon"><use href="#ic-code"/></svg>Dev Hub
        </a>
        <a href="/session/new" class="nav-item c-purple {% if request.url.path.startswith('/session') %}active{% endif %}">
          <svg class="nav-icon"><use href="#ic-wand"/></svg>Wizard
        </a>
        <a href="/insights" class="nav-item c-blue {% if request.url.path.startswith('/insights') %}active{% endif %}">
          <svg class="nav-icon"><use href="#ic-bulb"/></svg>Insights
        </a>
        <a href="/architecture" class="nav-item c-blue {% if request.url.path.startswith('/architecture') %}active{% endif %}">
          <svg class="nav-icon"><use href="#ic-layers"/></svg>Architecture
        </a>
      </div>

      <div class="nav-group">
        <span class="nav-label">Sistema</span>
        <a href="/inbox" class="nav-item c-amber {% if request.url.path.startswith('/inbox') %}active{% endif %}">
          <svg class="nav-icon"><use href="#ic-inbox"/></svg>Inbox
        </a>
        <a href="/security" class="nav-item c-red {% if request.url.path.startswith('/security') %}active{% endif %}">
          <svg class="nav-icon"><use href="#ic-shield"/></svg>Security
        </a>
        <a href="/sessions" class="nav-item c-teal {% if request.url.path.startswith('/sessions') %}active{% endif %}">
          <svg class="nav-icon"><use href="#ic-clock"/></svg>Sesiones
        </a>
        <a href="/skills" class="nav-item c-blue {% if request.url.path.startswith('/skills') %}active{% endif %}">
          <svg class="nav-icon"><use href="#ic-tool"/></svg>Skills
        </a>
        <a href="/jobs" class="nav-item c-amber {% if request.url.path.startswith('/jobs') %}active{% endif %}">
          <svg class="nav-icon"><use href="#ic-cog"/></svg>Jobs
        </a>
        <a href="/integrations" class="nav-item c-teal {% if request.url.path.startswith('/integrations') %}active{% endif %}">
          <svg class="nav-icon"><use href="#ic-plug"/></svg>Integrations
        </a>
      </div>

    </nav>
  </aside>

  <!-- Main content -->
  <div class="main-wrap">
    <header class="topbar">
      <h1 class="topbar-title">{{ title or "JarvisOS" }}</h1>
    </header>
    <main class="page-body">
      {% block content %}{% endblock %}
    </main>
  </div>

</div>
</body>
</html>
